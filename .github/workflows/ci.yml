name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install ruff mcp[cli]
      - name: Lint with ruff
        run: ruff check src/ install.py
      - name: Check formatting
        run: ruff format --check src/ install.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        continue-on-error: true

  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install mcp[cli]
      - name: Check server.py imports
        run: |
          python -c "import ast; ast.parse(open('src/server.py').read()); print('server.py: syntax OK')"
      - name: Check resolve_mcp_server.py imports
        run: |
          python -c "import ast; ast.parse(open('src/resolve_mcp_server.py').read()); print('resolve_mcp_server.py: syntax OK')"
      - name: Check install.py imports
        run: |
          python -c "import ast; ast.parse(open('install.py').read()); print('install.py: syntax OK')"
